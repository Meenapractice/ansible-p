- name: ansible facts
  hosts: local
  connection: local
  tasks:
  - name: ansible facts
    ansible.builtin.debug:
      msg: "{{ ansible_facts }}"

  - name: check if redhat or not
    ansible.builtin.debug:
      msg: "It is Redhat distribution"
    when: ansible_facts.os_family == "RedHat"

  - name: check if Debian or not
    ansible.builtin.debug:
      msg: "It is Debain distribution"
    when: ansible_facts.os_family == "Debain"