- name: Filters
  hosts: local
  connection: local
  vars:
    Course: Linux, Shell, Ansible
    tagsMap:
      name: Meena
      course: Devops
      duration: 4
    tagsList:  [
        {
            "key": "name",
            "value": "Meena"
        },
        {
            "key": "course",
            "value": "Devops"
        },
        {
            "key": "duration",
            "value": 4
        }
    ]

  tasks:
  - name: Filters
    ansible.builtin.debug:
      msg: "{{ Greetings | default('Good Morning')}}"
  
  - name: String to list
    ansible.builtin.debug:
      msg: "{{ Course | split(',') }}"

  - name: Map to list
    ansible.builtin.debug:
      msg: "{{ tagsMap | dict2items }}"

  - name: list to map
    ansible.builtin.debug:
      msg: "{{ tagsList | items2dict }}"

  - name: set facts
    ansible.builtin.set_fact:
      students_yaml: "{{ lookup('file', 'student.yaml') | from_yaml }}"
  
  - name: convert to json
    ansible.builtin.debug:
      msg: "{{ students_yaml | nice_to_json }}"

  