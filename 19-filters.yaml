- name: Filters
  hosts: local
  connection: local
  vars:
    Course: Linux, Shell, Ansible
    name: "Devops with Ansible"
    ipv4: 256.340.567.400
    tagsMap:
      name: Meena
      course: Devops
      duration: 4
    tagsList:  [
        {
            "key": "name",
            "value": "Meena"
        },
        {
            "key": "course",
            "value": "Devops"
        },
        {
            "key": "duration",
            "value": 4
        }
    ]

  tasks:
  - name: Filters
    ansible.builtin.debug:
      msg: "{{ Greetings | default('Good Morning')}}"
  
  - name: String to list
    ansible.builtin.debug:
      msg: "{{ Course | split(',') }}"

  - name: Map to list
    ansible.builtin.debug:
      msg: "{{ tagsMap | dict2items }}"

  - name: list to map
    ansible.builtin.debug:
      msg: "{{ tagsList | items2dict }}"

  - name: set facts
    ansible.builtin.set_fact:
      students_yaml: "{{ lookup('file', 'student.yaml') | from_yaml }}"
  
  - name: convert to json
    ansible.builtin.debug:
      msg: "{{ students_yaml | to_nice_json }}"

  - name: lower to upper
    ansible.builtin.debug:
      msg: "{{ name | upper }}"

  - name: upper to lower
    ansible.builtin.debug:
      msg: "{{ name | lower }}"

  - name: correct ipv4
    ansible.builtin.debug:
      msg: "{{ ipv4 | myipv4 }}"

  
  